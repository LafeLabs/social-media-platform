<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">

    <title>link feed</title>
<link href="data:image/x-icon;base64,AAABAAEAEBAQAAEABAAoAQAAFgAAACgAAAAQAAAAIAAAAAEABAAAAAAAgAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAZ4efAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAEREREREREREREREREREREREAAAAAAAAREQEREREREBERAREREREQEREBEAAAARAREQEQEREBEBERARAQAQEQEREBEBABARAREQEQEREBEBERARAAAAEQEREBERERERAREQEREREREBERAAAAAAAAEREREREREREREREREREREREAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" rel="icon" type="image/x-icon">

    <!--Stop Google:-->
<META NAME="robots" CONTENT="noindex,nofollow">
<script src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <a id = "mainlink"></a>
    <div id = "qrcode"></div>
    <table>
        <tr>
            <td>TEXT:</td>
            <td>
                <input id = "textinput">
            </td>
        </tr>
        <tr>
            <td>LINK:</td>
            <td>
                <input id = "urlinput">
            </td>
        </tr>
    </table>
    <span class ="button" id = "postbutton">POST</span>
    <span class ="button" id = "clearbutton">RESET FEED</span>
    <div id = "linkfeed"></div>

<script>


linkfeed = [];
link = {};
link.url = window.location.href.split("linkfeed.html")[0];
link.text = window.location.href.split("linkfeed.html")[0];
linkfeed.push(link);

document.getElementById("textinput").value = link.text;
document.getElementById("urlinput").value = link.url;
document.getElementById("mainlink").href = link.url;
document.getElementById("mainlink").innerHTML = link.text;


codesquaresize = 400;
qrcode = new QRCode(document.getElementById("qrcode"), {
	text: link.url,
	width: codesquaresize,
	height: codesquaresize,
	colorDark : "#000000",
	colorLight : "#ffffff",
	correctLevel : QRCode.CorrectLevel.H
});

document.getElementById("textinput").onchange = function(){
    link.text = this.value;
    document.getElementById("mainlink").innerHTML = link.text;
}
document.getElementById("urlinput").onchange = function(){
    link.url = this.value;
    document.getElementById("mainlink").href = link.url;
    qrcode.makeCode(link.url);
}

var httpc = new XMLHttpRequest();
httpc.onreadystatechange = function(){
    if (this.readyState == 4 && this.status == 200) {
        linkfeed = JSON.parse(this.responseText);
        loadfeed();
    }
};
httpc.open("GET", "load-file.php?filename=linkfeed.json", true);
httpc.send();


function loadfeed(){
    document.getElementById("linkfeed").innerHTML = "";
    for(var index = linkfeed.length - 1;index >= 0;index--){
        var newsign = document.createElement("div");
        newsign.className = "sign";
        var indexspan = document.createElement("SPAN");
        indexspan.className = "index";
        indexspan.innerHTML = index.toString(); 
        var newqrcode = document.createElement("div");
        var newlink = document.createElement("a");
        var delbutton = document.createElement("div");
        delbutton.className = "button";
        delbutton.innerHTML = "DELETE";
        delbutton.onclick = function(){
            thisindex = parseInt(this.parentNode.getElementsByClassName("index")[0].innerHTML);
            var newfeed = [];
            for(var index = 0;index < linkfeed.length;index++){
                if(index != thisindex){
                    newfeed.push(linkfeed[index]);
                }
            }
            linkfeed = newfeed;
            savefeed();
            loadfeed();
        }
        var upbutton = document.createElement("div");
        upbutton.className = "button";
        upbutton.innerHTML = "MOVE UP";
        upbutton.onclick = function(){
            thisindex = parseInt(this.parentNode.getElementsByClassName("index")[0].innerHTML);
            if(thisindex != linkfeed.length - 1){
                var newfeed = [];
                for(var index = 0;index < thisindex;index++){
                    newfeed.push(linkfeed[index]);
                }
                newfeed.push(linkfeed[thisindex + 1]);
                newfeed.push(linkfeed[thisindex]);
                
                for(var index = thisindex + 2;index < linkfeed.length;index++){
                    newfeed.push(linkfeed[index]);
                }
                linkfeed = newfeed;
                savefeed();
                loadfeed();
            }
        }             
        
        var downbutton = document.createElement("div");
        downbutton.innerHTML = "MOVE DOWN";
        downbutton.className = "button";
        downbutton.onclick = function(){
            thisindex = parseInt(this.parentNode.getElementsByClassName("index")[0].innerHTML);
            if(thisindex != 0){
                var newfeed = [];
                for(var index = 0;index < thisindex - 1;index++){
                    newfeed.push(linkfeed[index]);
                }
                newfeed.push(linkfeed[thisindex]);
                newfeed.push(linkfeed[thisindex - 1]);
                
                for(var index = thisindex + 1;index < linkfeed.length;index++){
                    newfeed.push(linkfeed[index]);
                }
                linkfeed = newfeed;
                savefeed();
                loadfeed();
            }
        }                

        newlink.href = linkfeed[index].url;
        newlink.innerHTML = linkfeed[index].text;
        newsign.appendChild(indexspan);
        newsign.appendChild(newqrcode);
        newsign.appendChild(newlink);
        newsign.appendChild(delbutton);
        newsign.appendChild(upbutton);
        newsign.appendChild(downbutton);
        
        document.getElementById("linkfeed").appendChild(newsign);
        var localqrcode = new QRCode(newqrcode, {
        	text: linkfeed[index].url,
        	width: codesquaresize,
        	height: codesquaresize,
        	colorDark : "#000000",
        	colorLight : "#ffffff",
        	correctLevel : QRCode.CorrectLevel.H
        });
        newqrcode.getElementsByTagName("IMG")[0].onclick = function(){
              thisindex = parseInt(this.parentNode.parentNode.getElementsByClassName("index")[0].innerHTML);
              link = JSON.parse(JSON.stringify(linkfeed[thisindex]));
                document.getElementById("textinput").value = link.text;
                document.getElementById("urlinput").value = link.url;
                document.getElementById("mainlink").href = link.url;
                document.getElementById("mainlink").innerHTML = link.text;
              
        }
    }
}

function savefeed(){
    var url = "save-file.php";        
    var httpc = new XMLHttpRequest();
    httpc.open("POST", url, true);
    httpc.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
    httpc.send("data="+encodeURIComponent(JSON.stringify(linkfeed,null,"    "))+"&filename=linkfeed.json");//send text to filesaver.php
}

document.getElementById("postbutton").onclick = function(){
    linkfeed.push(JSON.parse(JSON.stringify(link)));
    loadfeed();
    savefeed();
}

document.getElementById("clearbutton").onclick = function(){
    linkfeed = [];
    link.url = window.location.href;
    link.text = "Link back to this web page!";
    linkfeed = [
    {
        "url": "index.html",
        "text": "index.html"
    },
    {
        "url": "https://github.com/LafeLabs/social-media-platform",
        "text": "replication code"
    },
    {
        "url": "edit-files.html",
        "text": "edit-files.html"
    },
    {
        "url": "linkfeed.html",
        "text": "linkfeed.html"
    },
    {
        "url": "app-store.html",
        "text": "app-store.html"
    }
];

    loadfeed();
    savefeed();
}

</script>

    font-family:Comic Sans MS;

}

    background-color:#80808080;
}
.button:active{
    background-color:green;
}
.index{
    display:none;
}
</style>
</body>
</html>

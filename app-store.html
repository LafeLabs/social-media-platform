<script>

codesquaresize = 400;
qrcode = new QRCode(document.getElementById("qrcode"), {
	text: window.location.href,
	width: codesquaresize,
	height: codesquaresize,
	colorDark : "#000000",
	colorLight : "#ffffff",
	correctLevel : QRCode.CorrectLevel.H
});

if(innerWidth > innerHeight){
    squaresize = innerHeight - 200;
}
else{
    squaresize = innerWidth - 200;
    
}


files = [];

var httpcUpload = new XMLHttpRequest();
httpcUpload.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
        files = JSON.parse(this.responseText);
        loadappstore();
    }
};
httpcUpload.open("GET", "list-files.php", true);
httpcUpload.send();

function loadappstore(){

    for(var index = 0;index < files.length;index++) {
        if(files[index].includes(".html") || files[index].includes(".HTML") ){
            var newa = document.createElement("A");
            newa.href = files[index];
            newa.innerHTML = files[index];
            document.getElementById("appstore").appendChild(newa);
        }
    }    
}

currentfile = "wall.txt";

motd = "";
var httpc = new XMLHttpRequest();
httpc.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
        motd = this.responseText;
        document.getElementById("wall").value = motd;  
    }
};
httpc.open("GET", "load-file.php?filename=" + currentfile, true);
httpc.send();

document.getElementById("wall").onkeyup = function() {
    scroll = this.value;
    data = encodeURIComponent(this.value);
    var httpc = new XMLHttpRequest();
    var url = "save-file.php";        
    httpc.open("POST", url, true);
    httpc.setRequestHeader("Content-Type", "application/x-www-form-urlencoded;charset=utf-8");
    httpc.send("data="+data+"&filename=" + currentfile);//send text to save-file.php
}


directories = [];
var httpc2 = new XMLHttpRequest();
    httpc2.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
        directories = JSON.parse(this.responseText);

        var newa = document.createElement("A");
        newa.innerHTML = "UP A LEVEL ../";
        newa.href = "../";
        document.getElementById("branches").appendChild(newa);
        for(var index = 0;index < directories.length;index++) {
            var newa = document.createElement("A");
            newa.innerHTML = directories[index] + "/";
            newa.href = directories[index] + "/";
            document.getElementById("branches").appendChild(newa);
        }
    }
};

httpc2.open("GET", "list-branches.php", true);
httpc2.send();


</script>

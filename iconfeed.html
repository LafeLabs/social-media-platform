function drawfeed(){
       document.getElementById("iconfeed").innerHTML = "";
       for(var iconindex = iconfeed.length - 1;iconindex >= 0;iconindex--){
           var newdiv = document.createElement("DIV");//sign box
           newdiv.className = "signbox";
           var newcan = document.createElement("CANVAS");
            var indexspan = document.createElement("SPAN");
            indexspan.className = "index";
            indexspan.innerHTML = iconindex.toString();

            var delbutton = document.createElement("SPAN");
            delbutton.innerHTML = "DELETE";
            delbutton.className = "signcontrolbutton";
            delbutton.onclick = function(){
                thisindex = parseInt(this.parentNode.getElementsByClassName("index")[0].innerHTML);
                var newfeed = [];
                for(var index = 0;index < iconfeed.length;index++){
                    if(index != thisindex){
                        newfeed.push(iconfeed[index]);
                    }
                }
                iconfeed = newfeed;
                savefeed();
                drawfeed();
            }
            var upbutton = document.createElement("SPAN");
            upbutton.innerHTML = "MOVE UP";
            upbutton.className = "button";
            upbutton.onclick = function(){
                thisindex = parseInt(this.parentNode.getElementsByClassName("index")[0].innerHTML);
                if(thisindex != iconfeed.length - 1){
                    var newfeed = [];
                    for(var index = 0;index < thisindex;index++){
                        newfeed.push(iconfeed[index]);
                    }
                    newfeed.push(iconfeed[thisindex + 1]);
                    newfeed.push(iconfeed[thisindex]);
                    
                    for(var index = thisindex + 2;index < iconfeed.length;index++){
                        newfeed.push(iconfeed[index]);
                    }
                    iconfeed = newfeed;
                    savefeed();
                    drawfeed();                    
                }
            }            
            var downbutton = document.createElement("SPAN");
            downbutton.innerHTML = "MOVE DOWN";
            downbutton.className = "button";
            downbutton.onclick = function(){
                thisindex = parseInt(this.parentNode.getElementsByClassName("index")[0].innerHTML);
                if(thisindex != 0){
                    var newfeed = [];
                    for(var index = 0;index < thisindex - 1;index++){
                        newfeed.push(iconfeed[index]);
                    }
                    newfeed.push(iconfeed[thisindex]);
                    newfeed.push(iconfeed[thisindex - 1]);
                    
                    for(var index = thisindex + 1;index < iconfeed.length;index++){
                        newfeed.push(iconfeed[index]);
                    }
                    iconfeed = newfeed;
                    savefeed();
                    drawfeed();                    
                }

            }            

           newdiv.appendChild(newcan);
           newdiv.appendChild(indexspan);
           
           var newline  = document.createElement("P");
           
           newdiv.appendChild(newline);
           newdiv.appendChild(delbutton);
           newdiv.appendChild(upbutton);
           newdiv.appendChild(downbutton);

            newcan.onclick = function(){
                thisindex = parseInt(this.parentNode.getElementsByClassName("index")[0].innerHTML);
                icon = JSON.parse(JSON.stringify(iconfeed[thisindex]));
                drawicon();
                
                document.getElementById("iconio").value = JSON.stringify(icon,null,"    ");
            }
            document.getElementById("iconfeed").appendChild(newdiv);
           ctx = newcan.getContext("2d");
           squaresize = 400;
            newcan.width = squaresize;//px
            newcan.height = squaresize;//px
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            for(var strokeindex = 0;strokeindex < iconfeed[iconindex].length;strokeindex++){
                ctx.lineWidth = Math.round(0.01*squaresize*iconfeed[iconindex][strokeindex].strokewidth);
                ctx.strokeStyle = iconfeed[iconindex][strokeindex].color;
                ctx.beginPath(); // Start a new path
            
                ctx.moveTo(0.01*squaresize*iconfeed[iconindex][strokeindex].points[0].x,0.01*squaresize*iconfeed[iconindex][strokeindex].points[0].y); // Move the pen to (30, 50)
                for(var pointindex = 1;pointindex < iconfeed[iconindex][strokeindex].points.length;pointindex++){
    
                    ctx.lineTo(0.01*squaresize*iconfeed[iconindex][strokeindex].points[pointindex].x,0.01*squaresize*iconfeed[iconindex][strokeindex].points[pointindex].y); // Draw a line to (150, 100)    
                }
                ctx.stroke(); // Render the path
                
            }
           
       }
       
}

inLine = false;

function draw() {
  
  if(mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height){
      if (mouseIsPressed === true) {
        if(inLine == false){
            var  point = {};
            point.x = (100*mouseX/width).toFixed(1);
            point.y = (100*mouseY/width).toFixed(1);
            brushstroke.points.push(point);
        }
        line(mouseX, mouseY, pmouseX, pmouseY);
        inLine = true;
        if(mouseX != pmouseX || mouseY != pmouseY){
            var  point = {};
            point.x = (100*mouseX/width).toFixed(1);
            point.y = (100*mouseY/width).toFixed(1);
            brushstroke.points.push(point);
        }
      }
      else{
          if(inLine){
              icon.push(JSON.parse(JSON.stringify(brushstroke)));
              brushstroke.points = [];
          }
          inLine = false;
      }
  }
}


function drawicon(){
    clear();
    //background(159,135,103);
    for(var strokeindex = 0;strokeindex < icon.length;strokeindex++){
        for(var pointindex = 1;pointindex < icon[strokeindex].points.length;pointindex++){
            
            stroke(icon[strokeindex].color);
            strokeWeight(Math.round(0.01*width*icon[strokeindex].strokewidth));
            line(0.01*width*icon[strokeindex].points[pointindex - 1].x,0.01*width*icon[strokeindex].points[pointindex - 1].y,0.01*width*icon[strokeindex].points[pointindex].x,0.01*width*icon[strokeindex].points[pointindex].y);
        }
    }
}

<script>

titles = document.getElementsByTagName("H1");
for(var index = 0;index < titles.length;index++){
    rainbowstring(titles[index]);    
}
rainbow(document.getElementsByTagName("A"));

codesquaresize = 170;
marginsize = 40;
fontsize = 12;
//globalurl = "http://www.trashrobot.org/qrcode.html";
globalurl = window.location.href;
qrcode = new QRCode(document.getElementById("qrcode"), {
	text: globalurl,
	width: codesquaresize,
	height: codesquaresize,
	colorDark : "#000000",
	colorLight : "#ffffff",
	correctLevel : QRCode.CorrectLevel.H
});

files = [];

var httpcUpload = new XMLHttpRequest();
httpcUpload.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
        files = JSON.parse(this.responseText);
        loadfiles();
    }
};
httpcUpload.open("GET", "list-files.php", true);
httpcUpload.send();

function loadfiles(){
    listhtml = "<track-list>\n";
    listhtml += "  <ol slot = \"tracks\">\n";
    for(var index = 0;index < files.length;index++){
        if(files[index].substring(files[index].length-4,files[index].length) == ".m4a" || files[index].substring(files[index].length-4,files[index].length) == ".mp3"||   files[index].substring(files[index].length-4,files[index].length) == ".wav"){
            listhtml += "    <li>\n";
            listhtml += "      <strong>" + files[index] + "</strong>\n";
        listhtml += "      <audio controls src = \"" + files[index] + "\"></audio>\n";
            listhtml += "    </li>\n";                
        }

    }
    listhtml += "  </ol>\n";
    listhtml += "</track-list>";
    document.getElementById("track-list").innerHTML = listhtml;
    rainbow(document.getElementsByTagName("li"));

}


uploadImages = [];

var httpcUpload = new XMLHttpRequest();
httpcUpload.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
        uploadImages = JSON.parse(this.responseText);
        loadimagefeed();
    }
};
httpcUpload.open("GET", "list-files.php", true);
httpcUpload.send();

function loadimagefeed(){

    for(var index = uploadImages.length - 1;index >= 0;index--) {
        if(uploadImages[index].includes(".SVG") || uploadImages[index].includes(".svg") || uploadImages[index].includes(".png") || uploadImages[index].includes(".PNG") || uploadImages[index].includes(".jpg") || uploadImages[index].includes(".JPG") ||uploadImages[index].includes(".jpeg") || uploadImages[index].includes(".gif") ||uploadImages[index].includes(".GIF")){
            
            var newuploadbox = document.createElement("DIV");
            newuploadbox.classList.add("imagebox");
            var newimg = document.createElement("IMG");
            newimg.src = uploadImages[index];
            newimg.classList.add("uploadimage");
            newuploadbox.appendChild(newimg);
            document.getElementById("imagefeed").appendChild(newuploadbox);
    
            
        }
    }    
}

</script>

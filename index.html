<script>

codesquaresize = 400;
qrcode = new QRCode(document.getElementById("qrcode"), {
	text: window.location.href,
	width: codesquaresize,
	height: codesquaresize,
	colorDark : "#000000",
	colorLight : "#ffffff",
	correctLevel : QRCode.CorrectLevel.H
});

if(innerWidth > innerHeight){
    squaresize = innerHeight - 200;
}
else{
    squaresize = innerWidth - 200;
    
}

messagefeed = [];
iconfeed = [];
linkfeed = [];

var httpc = new XMLHttpRequest();
httpc.onreadystatechange = function(){
    if (this.readyState == 4 && this.status == 200) {
        messagefeed = JSON.parse(this.responseText);
        loadmessagefeed();
    }
};
httpc.open("GET", "load-file.php?filename=messagefeed.json", true);
httpc.send();


var httpc2 = new XMLHttpRequest();
httpc2.onreadystatechange = function(){
    if (this.readyState == 4 && this.status == 200) {
        iconfeed = JSON.parse(this.responseText);
        loadiconfeed();
    }
};
httpc2.open("GET", "load-file.php?filename=iconfeed.json", true);
httpc2.send();

var httpc3 = new XMLHttpRequest();
httpc3.onreadystatechange = function(){
    if (this.readyState == 4 && this.status == 200) {
        linkfeed = JSON.parse(this.responseText);
        loadlinkfeed();
    }
};
httpc3.open("GET", "load-file.php?filename=linkfeed.json", true);
httpc3.send();

function loadmessagefeed(){

    document.getElementById("messagefeed").innerHTML = "";
    for(var index = messagefeed.length - 1;index >= 0;index--){
        var localmessage = document.createElement("DIV");
        localmessage.innerHTML = messagefeed[index];
        localmessage.className = "message";
        document.getElementById("messagefeed").appendChild(localmessage);
    }

}

function loadiconfeed(){
    document.getElementById("iconfeed").innerHTML = "";
    for(var iconindex = iconfeed.length - 1;iconindex >= 0;iconindex--){
       var newdiv = document.createElement("DIV");//sign box
       newdiv.className = "signbox";
       var newcan = document.createElement("CANVAS");
       newdiv.appendChild(newcan);

       
        document.getElementById("iconfeed").appendChild(newdiv);
       ctx = newcan.getContext("2d");
       squaresize = 0.5*innerWidth;
        newcan.width = squaresize;//px
        newcan.height = squaresize;//px
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        for(var strokeindex = 0;strokeindex < iconfeed[iconindex].length;strokeindex++){
            ctx.lineWidth = Math.round(0.01*squaresize*iconfeed[iconindex][strokeindex].strokewidth);
            ctx.strokeStyle = iconfeed[iconindex][strokeindex].color;
            ctx.beginPath(); // Start a new path
        
            ctx.moveTo(0.01*squaresize*iconfeed[iconindex][strokeindex].points[0].x,0.01*squaresize*iconfeed[iconindex][strokeindex].points[0].y); // Move the pen to (30, 50)
            for(var pointindex = 1;pointindex < iconfeed[iconindex][strokeindex].points.length;pointindex++){

                ctx.lineTo(0.01*squaresize*iconfeed[iconindex][strokeindex].points[pointindex].x,0.01*squaresize*iconfeed[iconindex][strokeindex].points[pointindex].y); // Draw a line to (150, 100)    
            }
            ctx.stroke(); // Render the path
            
        }
       
   }   
}
function loadlinkfeed(){
    document.getElementById("linkfeed").innerHTML = "";
    for(var index = linkfeed.length - 1;index  >= 0;index--){
        var newlink = document.createElement("A");
        newlink.innerHTML = linkfeed[index].text;
        newlink.href = linkfeed[index].url;
        document.getElementById("linkfeed").appendChild(newlink);
    }
}


uploadImages = [];

var httpcUpload = new XMLHttpRequest();
httpcUpload.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
        uploadImages = JSON.parse(this.responseText);
        loadimagefeed();
    }
};
httpcUpload.open("GET", "list-files.php", true);
httpcUpload.send();

function loadimagefeed(){

    for(var index = uploadImages.length - 1;index >= 0;index--) {
        if(uploadImages[index].includes(".SVG") || uploadImages[index].includes(".svg") || uploadImages[index].includes(".png") || uploadImages[index].includes(".PNG") || uploadImages[index].includes(".jpg") || uploadImages[index].includes(".JPG") ||uploadImages[index].includes(".jpeg") || uploadImages[index].includes(".gif") ||uploadImages[index].includes(".GIF")){
            
            var newuploadbox = document.createElement("DIV");
            newuploadbox.classList.add("imagebox");
            var newimg = document.createElement("IMG");
            newimg.src = uploadImages[index];
            newimg.classList.add("uploadimage");
            newuploadbox.appendChild(newimg);
            document.getElementById("imagefeed").appendChild(newuploadbox);
    
            
        }
    }    
}

currentfile = "wall.txt";

motd = "";
var httpc = new XMLHttpRequest();
httpc.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
        motd = this.responseText;
        document.getElementById("wall").value = motd;  
    }
};
httpc.open("GET", "load-file.php?filename=" + currentfile, true);
httpc.send();

document.getElementById("wall").onkeyup = function() {
    scroll = this.value;
    data = encodeURIComponent(this.value);
    var httpc = new XMLHttpRequest();
    var url = "save-file.php";        
    httpc.open("POST", url, true);
    httpc.setRequestHeader("Content-Type", "application/x-www-form-urlencoded;charset=utf-8");
    httpc.send("data="+data+"&filename=" + currentfile);//send text to save-file.php
}


directories = [];
var httpc2 = new XMLHttpRequest();
    httpc2.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
        directories = JSON.parse(this.responseText);

        var newa = document.createElement("A");
        newa.innerHTML = "UP A LEVEL ../";
        newa.href = "../";
        document.getElementById("branches").appendChild(newa);
        for(var index = 0;index < directories.length;index++) {
            var newa = document.createElement("A");
            newa.innerHTML = directories[index] + "/";
            newa.href = directories[index] + "/";
            document.getElementById("branches").appendChild(newa);
        }
    }
};

httpc2.open("GET", "list-branches.php", true);
httpc2.send();


</script>
